name: Build NeoTUN

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  # ----------------------------------------------------------------
  # Windows: MinGW + CMake → neotun.exe
  # ----------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW + CMake via Scoop
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
          irm get.scoop.sh | iex
          scoop install mingw cmake --no-update-scoop

      - name: Download WinDivert
        run: |
          $url = "https://github.com/basil00/Divert/releases/download/v2.2.2/WinDivert-2.2.2-A.zip"
          Invoke-WebRequest $url -OutFile WinDivert.zip
          Expand-Archive WinDivert.zip -DestinationPath WinDivert_sdk
          $src = (Get-ChildItem WinDivert_sdk -Directory | Select-Object -First 1).FullName
          New-Item -ItemType Directory -Force vendor/windivert/include | Out-Null
          New-Item -ItemType Directory -Force vendor/windivert/x64     | Out-Null
          Copy-Item "$src/include/windivert.h"   vendor/windivert/include/
          Copy-Item "$src/x64/WinDivert.dll"     vendor/windivert/x64/
          Copy-Item "$src/x64/WinDivert.lib"     vendor/windivert/x64/
          Copy-Item "$src/x64/WinDivert64.sys"   vendor/windivert/x64/

      - name: Build neotun.exe (CMake)
        run: |
          New-Item -ItemType Directory -Force build | Out-Null
          cmake -S . -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build GUI exe (PyInstaller)
        run: |
          pip install customtkinter pyinstaller --quiet
          Copy-Item build/neotun.exe                     windows/
          Copy-Item vendor/windivert/x64/WinDivert.dll   windows/
          Copy-Item vendor/windivert/x64/WinDivert64.sys windows/
          pyinstaller --onefile --noconsole `
            --name "NeoTUN" `
            --add-data "windows/neotun.exe;." `
            --add-data "windows/WinDivert.dll;." `
            --add-data "windows/WinDivert64.sys;." `
            windows/gui.py
          Copy-Item dist/NeoTUN.exe ${{ github.workspace }}/NeoTUN-Windows.exe

      - uses: actions/upload-artifact@v4
        with:
          name: NeoTUN-Windows
          path: ${{ github.workspace }}/NeoTUN-Windows.exe

  # ----------------------------------------------------------------
  # Android: Gradle + NDK → NeoTUN.apk
  # ----------------------------------------------------------------
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Init nested submodules
        run: git submodule update --init --recursive
        working-directory: ${{ github.workspace }}

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.0.12077973" \
            "cmake;3.22.1" \
            --sdk_root=$ANDROID_SDK_ROOT
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Write local.properties
        working-directory: ${{ github.workspace }}/android
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Install Gradle 8.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.4/bin" >> $GITHUB_PATH

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ hashFiles('android/**/*.gradle') }}
          restore-keys: gradle-

      - name: Build APK
        working-directory: ${{ github.workspace }}/android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Collect APK
        run: find ${{ github.workspace }}/android -name "*.apk" | head -1 | xargs -I{} cp {} ${{ github.workspace }}/NeoTUN-Android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: NeoTUN-Android
          path: ${{ github.workspace }}/NeoTUN-Android.apk

  # ----------------------------------------------------------------
  # Release: создаём GitHub Release с файлами напрямую
  # Запускается только при пуше тега v*
  # ----------------------------------------------------------------
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [ build-windows, build-android ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: NeoTUN-Windows
          path: release-files

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: NeoTUN-Android
          path: release-files

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: NeoTUN ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## Установка
            **Windows**: скачай `NeoTUN-Windows.zip`, распакуй, запусти `NeoTUN.exe` от имени администратора.
            **Android**: скачай и установи `NeoTUN-Android.apk`.
          files: |
            release-files/NeoTUN-Windows.exe
            release-files/NeoTUN-Android.apk
