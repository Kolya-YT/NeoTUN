name: Build NeoTUN

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  # ----------------------------------------------------------------
  # Windows: MinGW + CMake → neotun.exe
  # ----------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW via Scoop
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
          irm get.scoop.sh | iex
          scoop install mingw cmake

      - name: Download WinDivert
        run: |
          $url = "https://github.com/basil00/Divert/releases/download/v2.2.2/WinDivert-2.2.2-A.zip"
          Invoke-WebRequest $url -OutFile WinDivert.zip
          Expand-Archive WinDivert.zip -DestinationPath WinDivert_sdk
          $src = (Get-ChildItem WinDivert_sdk -Directory | Select-Object -First 1).FullName
          New-Item -ItemType Directory -Force vendor/windivert/include | Out-Null
          New-Item -ItemType Directory -Force vendor/windivert/x64     | Out-Null
          Copy-Item "$src/include/windivert.h"  vendor/windivert/include/
          Copy-Item "$src/x64/WinDivert.dll"    vendor/windivert/x64/
          Copy-Item "$src/x64/WinDivert.lib"    vendor/windivert/x64/
          Copy-Item "$src/x64/WinDivert64.sys"  vendor/windivert/x64/

      - name: Build
        run: |
          New-Item -ItemType Directory -Force build | Out-Null
          cmake -S . -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Package
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item build/neotun.exe                    dist/
          Copy-Item vendor/windivert/x64/WinDivert.dll  dist/
          Copy-Item vendor/windivert/x64/WinDivert64.sys dist/
          Copy-Item windows/gui.py                      dist/
          Compress-Archive dist/* NeoTUN-Windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: NeoTUN-Windows
          path: NeoTUN-Windows.zip

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: NeoTUN-Windows.zip

  # ----------------------------------------------------------------
  # Android: Gradle + NDK → NeoTUN.apk
  # ----------------------------------------------------------------
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ hashFiles('android/**/*.gradle') }}

      - name: Write local.properties
        working-directory: android
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build APK
        working-directory: android
        run: gradle assembleDebug --no-daemon

      - name: Find and rename APK
        run: find android -name "*.apk" | head -1 | xargs -I{} cp {} NeoTUN-Android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: NeoTUN-Android
          path: NeoTUN-Android.apk

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: NeoTUN-Android.apk
