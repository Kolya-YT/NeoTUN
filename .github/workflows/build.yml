name: Build NeoTUN

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  # ----------------------------------------------------------------
  # Windows: MinGW + CMake → neotun.exe + PyInstaller → NeoTUN-Windows.exe
  # ----------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW + CMake via Scoop
        shell: pwsh
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
          irm get.scoop.sh | iex
          scoop install mingw cmake --no-update-scoop

      - name: Download WinDivert
        shell: pwsh
        run: |
          $url = "https://github.com/basil00/Divert/releases/download/v2.2.2/WinDivert-2.2.2-A.zip"
          Invoke-WebRequest $url -OutFile WinDivert.zip
          Expand-Archive WinDivert.zip -DestinationPath WinDivert_sdk
          $src = (Get-ChildItem WinDivert_sdk -Directory | Select-Object -First 1).FullName
          New-Item -ItemType Directory -Force vendor/windivert/include | Out-Null
          New-Item -ItemType Directory -Force vendor/windivert/x64     | Out-Null
          Copy-Item "$src/include/windivert.h"   vendor/windivert/include/
          Copy-Item "$src/x64/WinDivert.dll"     vendor/windivert/x64/
          Copy-Item "$src/x64/WinDivert.lib"     vendor/windivert/x64/
          Copy-Item "$src/x64/WinDivert64.sys"   vendor/windivert/x64/

      - name: Build neotun.exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force build | Out-Null
          cmake -S . -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build GUI exe (PyInstaller)
        shell: pwsh
        run: |
          pip install customtkinter pyinstaller --quiet
          Copy-Item build/neotun.exe                     windows/
          Copy-Item vendor/windivert/x64/WinDivert.dll   windows/
          Copy-Item vendor/windivert/x64/WinDivert64.sys windows/
          pyinstaller --onefile --noconsole `
            --name "NeoTUN-Windows" `
            --add-data "windows/neotun.exe;." `
            --add-data "windows/WinDivert.dll;." `
            --add-data "windows/WinDivert64.sys;." `
            windows/gui.py

      - uses: actions/upload-artifact@v4
        with:
          name: NeoTUN-Windows
          path: dist/NeoTUN-Windows.exe

  # ----------------------------------------------------------------
  # Android: Gradle + NDK → NeoTUN-Android.apk
  # ----------------------------------------------------------------
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Init nested submodules
        shell: bash
        run: git submodule update --init --recursive

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK + CMake
        shell: bash
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.0.12077973" \
            "cmake;3.22.1" \
            --sdk_root=$ANDROID_SDK_ROOT
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Write local.properties
        shell: bash
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Generate yaml config.h
        shell: bash
        run: |
          cat > android/app/src/main/jni/hev-socks5-tunnel/third-part/yaml/src/config.h << 'EOF'
          /* Generated for Android NDK build */
          #define HAVE_CONFIG_H 1
          #define YAML_VERSION_MAJOR 0
          #define YAML_VERSION_MINOR 2
          #define YAML_VERSION_PATCH 5
          #define YAML_VERSION_STRING "0.2.5"
          EOF

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ hashFiles('android/**/*.gradle') }}
          restore-keys: gradle-

      - name: Build APK
        shell: bash
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Collect APK
        shell: bash
        run: |
          APK=$(find android -name "*.apk" | head -1)
          cp "$APK" NeoTUN-Android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: NeoTUN-Android
          path: NeoTUN-Android.apk

  # ----------------------------------------------------------------
  # Release — только при пуше тега v*
  # ----------------------------------------------------------------
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [ build-windows, build-android ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: NeoTUN-Windows
          path: release-files

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: NeoTUN-Android
          path: release-files

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: NeoTUN ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## Установка
            **Windows**: скачай `NeoTUN-Windows.exe` и запусти от имени администратора.
            **Android**: скачай и установи `NeoTUN-Android.apk`.
          files: |
            release-files/NeoTUN-Windows.exe
            release-files/NeoTUN-Android.apk
