name: Build NeoTUN

on:
  push:
    branches:
      - main
      - beta
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - beta
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
      
      - name: Download AndroidLibXrayLite AAR
        run: |
          mkdir -p android/app/libs
          curl -L -o android/app/libs/AndroidLibXrayLite.aar \
            https://github.com/2dust/AndroidLibXrayLite/releases/download/1.8.24/AndroidLibXrayLite-1.8.24.aar || \
          echo "Warning: Failed to download AAR, will try Gradle dependency"
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Generate localizations
        run: flutter gen-l10n
      
      - name: Build APK (split per ABI)
        run: flutter build apk --release --split-per-abi
      
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: neotun-android
          path: build/app/outputs/flutter-apk/*.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
      - run: flutter pub get
      - run: flutter gen-l10n
      - run: flutter build windows --release
      - run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath neotun-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: neotun-windows
          path: neotun-windows.zip

  release:
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v1
        with:
          files: |
            neotun-android/app-release.apk
            neotun-windows/neotun-windows.zip
