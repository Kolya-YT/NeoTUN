name: Build NeoTUN

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  # ----------------------------------------------------------------
  # Windows
  # ----------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW + CMake via Scoop
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
          irm get.scoop.sh | iex
          scoop install mingw cmake --no-update-scoop

      - name: Download WinDivert
        run: |
          $url = "https://github.com/basil00/Divert/releases/download/v2.2.2/WinDivert-2.2.2-A.zip"
          Invoke-WebRequest $url -OutFile WinDivert.zip
          Expand-Archive WinDivert.zip -DestinationPath WinDivert_sdk
          $src = (Get-ChildItem WinDivert_sdk -Directory | Select-Object -First 1).FullName
          New-Item -ItemType Directory -Force vendor/windivert/include | Out-Null
          New-Item -ItemType Directory -Force vendor/windivert/x64     | Out-Null
          Copy-Item "$src/include/windivert.h"   vendor/windivert/include/
          Copy-Item "$src/x64/WinDivert.dll"     vendor/windivert/x64/
          Copy-Item "$src/x64/WinDivert.lib"     vendor/windivert/x64/
          Copy-Item "$src/x64/WinDivert64.sys"   vendor/windivert/x64/

      - name: Build neotun.exe
        run: |
          New-Item -ItemType Directory -Force build | Out-Null
          cmake -S . -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build GUI exe
        run: |
          pip install customtkinter pyinstaller --quiet
          Copy-Item build/neotun.exe                     windows/
          Copy-Item vendor/windivert/x64/WinDivert.dll   windows/
          Copy-Item vendor/windivert/x64/WinDivert64.sys windows/
          pyinstaller --onefile --noconsole `
            --name "NeoTUN-Windows" `
            --add-data "windows/neotun.exe;." `
            --add-data "windows/WinDivert.dll;." `
            --add-data "windows/WinDivert64.sys;." `
            windows/gui.py

      - uses: actions/upload-artifact@v4
        with:
          name: NeoTUN-Windows
          path: dist/NeoTUN-Windows.exe

  # ----------------------------------------------------------------
  # Android
  # ----------------------------------------------------------------
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Init nested submodules
        run: git submodule update --init --recursive

      - name: Patch hev-jni.c (null-check + standard JNI exports)
        run: |
          JNI_FILE="android/app/src/main/jni/hev-socks5-tunnel/src/hev-jni.c"
          # Apply patch: guard RegisterNatives with null-check and add standard exports
          python3 - <<'PYEOF'
import re, sys

path = "android/app/src/main/jni/hev-socks5-tunnel/src/hev-jni.c"
src = open(path).read()

# 1. Patch JNI_OnLoad to null-check FindClass result
old = '''    klass = (*env)->FindClass (env, STR (PKGNAME) "/" STR (CLSNAME));
    (*env)->RegisterNatives (env, klass, native_methods,
                             N_ELEMENTS (native_methods));
    (*env)->DeleteLocalRef (env, klass);'''
new = '''    klass = (*env)->FindClass (env, STR (PKGNAME) "/" STR (CLSNAME));
    if (klass) {
        (*env)->RegisterNatives (env, klass, native_methods,
                                 N_ELEMENTS (native_methods));
        (*env)->DeleteLocalRef (env, klass);
    } else {
        (*env)->ExceptionClear (env);
    }'''
if old not in src:
    print("WARNING: JNI_OnLoad patch already applied or pattern not found")
else:
    src = src.replace(old, new)
    print("Patched JNI_OnLoad null-check")

# 2. Add standard JNI exports before #endif /* ANDROID */
exports = '''
/* Standard JNI name-mangled exports — fallback when RegisterNatives fails */
JNIEXPORT void JNICALL
Java_com_neotun_dpi_TProxyService_TProxyStartService (JNIEnv *env, jobject thiz,
                                                       jstring config_path, jint fd)
{
    native_start_service (env, thiz, config_path, fd);
}

JNIEXPORT void JNICALL
Java_com_neotun_dpi_TProxyService_TProxyStopService (JNIEnv *env, jobject thiz)
{
    native_stop_service (env, thiz);
}

JNIEXPORT jlongArray JNICALL
Java_com_neotun_dpi_TProxyService_TProxyGetStats (JNIEnv *env, jobject thiz)
{
    return native_get_stats (env, thiz);
}

'''
marker = '#endif /* ANDROID */'
if exports.strip() in src:
    print("Standard exports already present")
elif marker in src:
    src = src.replace(marker, exports + marker)
    print("Added standard JNI exports")
else:
    print("WARNING: could not find #endif /* ANDROID */ marker")

open(path, 'w').write(src)
print("Done")
PYEOF

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "ndk;26.3.11579264" \
            --sdk_root=$ANDROID_SDK_ROOT
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> $GITHUB_ENV

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build APK
        run: gradle assembleDebug --no-daemon --stacktrace
        working-directory: android

      - name: Collect APK
        run: |
          APK=$(find android -name "*.apk" | head -1)
          cp "$APK" NeoTUN-Android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: NeoTUN-Android
          path: NeoTUN-Android.apk

  # ----------------------------------------------------------------
  # Release — только при теге v*
  # ----------------------------------------------------------------
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [ build-windows, build-android ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: NeoTUN-Windows
          path: release-files

      - uses: actions/download-artifact@v4
        with:
          name: NeoTUN-Android
          path: release-files

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: NeoTUN ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## Установка
            **Windows**: скачай `NeoTUN-Windows.exe` и запусти от имени администратора.
            **Android**: скачай и установи `NeoTUN-Android.apk`.
          files: |
            release-files/NeoTUN-Windows.exe
            release-files/NeoTUN-Android.apk
