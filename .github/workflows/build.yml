name: Build NeoTUN

on:
  push:
    branches:
      - main
      - beta
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - beta
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
      
      - name: Download AndroidLibXrayLite AAR
        run: |
          mkdir -p android/app/libs
          wget -O android/app/libs/AndroidLibXrayLite.aar \
            https://github.com/2dust/AndroidLibXrayLite/releases/download/v25.12.1/libv2ray.aar
          
          # Verify the AAR file is valid
          if ! unzip -t android/app/libs/AndroidLibXrayLite.aar > /dev/null 2>&1; then
            echo "ERROR: Downloaded AAR is corrupted!"
            rm -f android/app/libs/AndroidLibXrayLite.aar
            exit 1
          fi
          
          echo "AAR downloaded and verified successfully"
          ls -lh android/app/libs/AndroidLibXrayLite.aar
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Generate localizations
        run: flutter gen-l10n
      
      - name: Build APK (debug for testing)
        run: flutter build apk --debug
      
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: neotun-android
          path: build/app/outputs/flutter-apk/*.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
      - run: flutter pub get
      - run: flutter gen-l10n
      - run: flutter build windows --release
      - run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath neotun-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: neotun-windows
          path: neotun-windows.zip
