name: Build NeoTUN

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  # ----------------------------------------------------------------
  # Windows: MinGW + CMake → neotun.exe
  # ----------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
        working-directory: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW + CMake via Scoop
        shell: pwsh
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
          irm get.scoop.sh | iex
          scoop install mingw cmake --no-update-scoop

      - name: Download WinDivert
        run: |
          $url = "https://github.com/basil00/Divert/releases/download/v2.2.2/WinDivert-2.2.2-A.zip"
          Invoke-WebRequest $url -OutFile WinDivert.zip
          Expand-Archive WinDivert.zip -DestinationPath WinDivert_sdk
          $src = (Get-ChildItem WinDivert_sdk -Directory | Select-Object -First 1).FullName
          New-Item -ItemType Directory -Force vendor/windivert/include | Out-Null
          New-Item -ItemType Directory -Force vendor/windivert/x64     | Out-Null
          Copy-Item "$src/include/windivert.h"   vendor/windivert/include/
          Copy-Item "$src/x64/WinDivert.dll"     vendor/windivert/x64/
          Copy-Item "$src/x64/WinDivert.lib"     vendor/windivert/x64/
          Copy-Item "$src/x64/WinDivert64.sys"   vendor/windivert/x64/

      - name: Build
        run: |
          New-Item -ItemType Directory -Force build | Out-Null
          cmake -S . -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Package
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item build/neotun.exe                     dist/
          Copy-Item vendor/windivert/x64/WinDivert.dll   dist/
          Copy-Item vendor/windivert/x64/WinDivert64.sys dist/
          Copy-Item windows/gui.py                       dist/
          Compress-Archive dist/* NeoTUN-Windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: NeoTUN-Windows
          path: ${{ github.workspace }}/NeoTUN-Windows.zip

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: NeoTUN-Windows.zip
          generate_release_notes: true

  # ----------------------------------------------------------------
  # Android: Gradle + NDK → NeoTUN.apk
  # ----------------------------------------------------------------
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}/android

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.0.12077973" \
            "cmake;3.22.1" \
            --sdk_root=$ANDROID_SDK_ROOT

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle') }}
          restore-keys: gradle-

      - name: Build APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Collect APK
        run: |
          find . -name "*.apk" | head -1 | xargs -I{} cp {} ${{ github.workspace }}/NeoTUN-Android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: NeoTUN-Android
          path: ${{ github.workspace }}/NeoTUN-Android.apk

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: NeoTUN-Android.apk
          generate_release_notes: true
