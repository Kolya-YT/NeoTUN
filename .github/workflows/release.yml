name: Build and Release

on:
  push:
    tags:
      - 'v*'
      - 'v*-beta.*'
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.24.0'

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Decode keystore
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ERROR: ANDROID_KEYSTORE_BASE64 secret is not set!"
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks
          echo "Keystore decoded successfully"
          ls -lh android/app/keystore.jks

      - name: Create key.properties
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ]; then
            echo "ERROR: Required secrets are not set!"
            echo "Please set ANDROID_KEYSTORE_PASSWORD and ANDROID_KEY_ALIAS"
            exit 1
          fi
          cat > android/key.properties << EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=keystore.jks
          EOF
          echo "key.properties created successfully"
          
      - name: Verify keystore
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          echo "Verifying keystore..."
          keytool -list -v -keystore android/app/keystore.jks -storepass "$KEYSTORE_PASSWORD" -alias "$KEY_ALIAS" || {
            echo "ERROR: Failed to verify keystore!"
            echo "Please recreate keystore with RSA algorithm:"
            echo "keytool -genkey -v -keystore keystore.jks -keyalg RSA -keysize 2048 -validity 10000 -alias $KEY_ALIAS"
            exit 1
          }

      - name: Build APK (Debug)
        if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
        run: flutter build apk --debug

      - name: Build APK (Release)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 7

  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Create portable archive
        run: |
          cd build/windows/x64/runner/Release
          7z a -tzip ../../../../../NeoTUN-Windows-x64.zip *

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: NeoTUN-Windows-x64.zip
          retention-days: 7

  create-release:
    name: Create GitHub Release
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: release/android

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: release/windows

      - name: Prepare release files
        run: |
          mkdir -p final-release
          # Copy only split APKs (not universal)
          cp release/android/app-arm64-v8a-release.apk final-release/ || true
          cp release/android/app-armeabi-v7a-release.apk final-release/ || true
          cp release/android/app-x86_64-release.apk final-release/ || true
          # Copy Windows ZIP
          cp release/windows/NeoTUN-Windows-x64.zip final-release/
          # Calculate checksums
          cd final-release
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: final-release/*
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-manifests:
    name: Update Manifests
    needs: create-release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Update app_update.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          
          # Get checksums from release
          WINDOWS_SHA256=$(curl -sL "https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF#refs/tags/}/checksums.txt" | grep "NeoTUN-Windows-x64.zip" | awk '{print $1}')
          ANDROID_SHA256=$(curl -sL "https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF#refs/tags/}/checksums.txt" | grep "arm64-v8a-release.apk" | awk '{print $1}')
          
          # Update manifest
          cat > app_update.json << EOF
          {
            "latest_version": "$VERSION",
            "notes": "Release $VERSION",
            "platforms": {
              "windows-x64": {
                "url": "https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF#refs/tags/}/NeoTUN-Windows-x64.zip",
                "sha256": "$WINDOWS_SHA256"
              },
              "android-arm64": {
                "url": "https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF#refs/tags/}/app-arm64-v8a-release.apk",
                "sha256": "$ANDROID_SHA256"
              }
            }
          }
          EOF
          
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add app_update.json
          git commit -m "Update app_update.json for version $VERSION"
          git push origin main
          git push
