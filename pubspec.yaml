name: neotun
description: Cross-platform VPN client powered by Xray-core
publish_to: 'none'
version: 1.2.2-beta.4+20

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  http: ^1.1.0
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2
  file_picker: ^6.1.1
  package_info_plus: ^5.0.1
  process_run: ^0.14.0
  crypto: ^3.0.3
  yaml: ^3.1.2
  provider: ^6.1.1
  archive: ^3.4.10
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  generate: true
  
  assets:
    - assets/images/logo.png
