plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.neotun.dpi'
    compileSdk 34

    defaultConfig {
        applicationId "com.neotun.dpi"
        minSdk 26
        targetSdk 34
        versionCode 6
        versionName "1.6"

        externalNativeBuild {
            cmake {
                arguments "-DANDROID_STL=none"
            }
        }
        ndk {
            abiFilters 'arm64-v8a', 'armeabi-v7a', 'x86_64'
        }
    }

    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
            version "3.22.1"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
    kotlinOptions {
        jvmTarget = '1.8'
    }
}

// ndk-build: hev-socks5-tunnel
tasks.register('buildHevTunnel', Exec) {
    // Prefer ANDROID_NDK_HOME env var, fall back to ndkDirectory
    def ndkPath = System.getenv("ANDROID_NDK_HOME")
        ?: System.getenv("ANDROID_NDK_ROOT")
        ?: android.ndkDirectory?.absolutePath

    if (!ndkPath) {
        throw new GradleException("NDK not found. Set ANDROID_NDK_HOME or install NDK via SDK manager.")
    }

    def isWindows = System.getProperty("os.name").toLowerCase().contains("windows")
    def ndkBuild = ndkPath + (isWindows ? "/ndk-build.cmd" : "/ndk-build")

    def jniDir  = file("src/main/jni").absolutePath
    def libsOut = file("src/main/jniLibs").absolutePath

    executable ndkBuild
    args = [
        "NDK_PROJECT_PATH=${jniDir}",
        "NDK_LIBS_OUT=${libsOut}",
        "APP_BUILD_SCRIPT=${jniDir}/Android.mk",
        "NDK_APPLICATION_MK=${jniDir}/Application.mk",
        "-j4"
    ]

    doFirst {
        println "ndk-build: ${ndkBuild}"
        println "jni dir:   ${jniDir}"
        println "libs out:  ${libsOut}"
    }
}

tasks.preBuild.dependsOn('buildHevTunnel')

dependencies {
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.lifecycle:lifecycle-service:2.7.0'
}
