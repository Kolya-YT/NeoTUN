plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.neotun.dpi'
    compileSdk 34

    defaultConfig {
        applicationId "com.neotun.dpi"
        minSdk 26
        targetSdk 34
        versionCode 2
        versionName "1.1"

        externalNativeBuild {
            cmake {
                arguments "-DANDROID_STL=none"
            }
        }
        ndk {
            abiFilters 'arm64-v8a', 'armeabi-v7a', 'x86_64'
        }
    }

    // CMake: наш neotun_bypass (SOCKS5 прокси)
    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
            version "3.22.1"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
    kotlinOptions {
        jvmTarget = '1.8'
    }
}

// ndk-build: hev-socks5-tunnel
tasks.register('buildHevTunnel', Exec) {
    def ndkDir = android.ndkDirectory
    def jniDir = file("src/main/jni")
    def libsOut = file("src/main/jniLibs")

    executable = ndkDir.absolutePath + (System.getProperty("os.name").toLowerCase().contains("windows") ? "/ndk-build.cmd" : "/ndk-build")
    args = [
        "NDK_PROJECT_PATH=${jniDir.absolutePath}",
        "NDK_LIBS_OUT=${libsOut.absolutePath}",
        "APP_BUILD_SCRIPT=${jniDir.absolutePath}/Android.mk",
        "NDK_APPLICATION_MK=${jniDir.absolutePath}/Application.mk",
        "-j4"
    ]
}

tasks.preBuild.dependsOn('buildHevTunnel')

dependencies {
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.lifecycle:lifecycle-service:2.7.0'
}
